# Standalone Postgres for prata-sys — deliberately OUTSIDE the app stack.
# Data lives on the TrueNAS pool (/mnt/dados/apps/postgres_data).
# Reachable only by containers on the shared "prata-net" network (no host port
# published -> not exposed on the LAN).
#
#   docker compose -f compose.yml up -d
#   docker compose -f compose.yml logs -f
services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /mnt/dados/apps/postgres_data:/var/lib/postgresql/data
    networks:
      - prata-net
    # Modest footprint for a 7 GiB host shared with other apps.
    shm_size: "256mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  prata-net:
    external: true
