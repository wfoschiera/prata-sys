name: Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  # Detect whether anything backend-relevant changed. Docs-only changes leave
  # `backend` false, so the heavy job below is skipped while the required
  # `test-backend` gate still reports success.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - backend/**
              - .github/workflows/test-backend.yml

  backend-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: local
      PROJECT_NAME: "prata-sys"
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: changethis
      # Email tests patch SMTP_HOST but rely on EMAILS_FROM_EMAIL from settings.
      # Previously supplied by a committed .env; set it explicitly now.
      EMAILS_FROM_EMAIL: test@example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend
      - name: Create test database
        run: psql "postgresql://postgres:changethis@localhost:5432/app" -c "CREATE DATABASE app_test;"
      - name: Migrate DB
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
        working-directory: backend
      - name: Store coverage files
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
      - name: Coverage report
        run: uv run coverage report --fail-under=95
        working-directory: backend

  # Required status check. Always runs and stays green when backend-tests is
  # skipped (docs-only change); goes red only when backend-tests actually fails.
  # Keeping this job named `test-backend` preserves the required-context name,
  # so no branch-protection change is needed.
  # https://github.com/marketplace/actions/alls-green#why
  test-backend:
    if: always()
    needs:
      - backend-tests
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: backend-tests
