name: Lint Frontend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  # Detect whether anything frontend-relevant changed. Docs-only changes leave
  # `frontend` false, so the heavy job below is skipped while the required
  # `lint-frontend` gate still reports success.
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - frontend/**
              - .github/workflows/lint-frontend.yml

  frontend-lint:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Typecheck
        run: bun run build
        working-directory: frontend

  # Required status check. Always runs and stays green when frontend-lint is
  # skipped (docs-only change); goes red only when frontend-lint actually fails.
  # Keeping this job named `lint-frontend` preserves the required-context name,
  # so no branch-protection change is needed.
  # https://github.com/marketplace/actions/alls-green#why
  lint-frontend:
    if: always()
    needs:
      - frontend-lint
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: frontend-lint
