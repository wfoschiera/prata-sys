name: Lint Frontend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: frontend
      - name: Lint
        run: bun run lint
        working-directory: frontend
      - name: Typecheck
        run: bun run build
        working-directory: frontend
