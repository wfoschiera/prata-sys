name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: "Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)"
        required: false
        default: "false"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changed:
              - backend/**
              - frontend/**
              - .env
              - .github/workflows/playwright.yml

  test-playwright:
    needs:
      - changes
    if: ${{ needs.changes.outputs.changed == 'true' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Official Playwright image ships chromium + all OS deps preinstalled, so we
    # skip `playwright install --with-deps` entirely. Tag must match the
    # @playwright/test version in frontend/package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    strategy:
      matrix:
        # Fewer shards + more workers per shard (see --workers below): halves the
        # duplicated per-shard setup while keeping overall parallelism.
        shardIndex: [1, 2]
        shardTotal: [2]
      fail-fast: false
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:latest
    env:
      ENVIRONMENT: local
      PROJECT_NAME: "prata-sys"
      # In a containerized job, services are reached by their label hostname
      # (not localhost).
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: changethis
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "False"
      EMAILS_FROM_EMAIL: dev@example.com
      MAILPIT_HOST: http://mailpit:8025
      # Backend runs inside this job's container, reachable on localhost.
      VITE_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'true' }}
        with:
          limit-access-to-actor: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend deps
        run: uv sync --frozen
        working-directory: backend

      - name: Install workspace deps (root + frontend)
        run: bun ci

      - name: Migrate DB and seed superuser
        run: uv run bash scripts/prestart.sh
        working-directory: backend

      - name: Generate API client
        run: bash scripts/generate-client.sh

      - name: Start backend (background)
        run: |
          nohup uv run fastapi run app/main.py --port 8000 > /tmp/backend.log 2>&1 &
          echo "started backend pid=$!"
        working-directory: backend

      - name: Wait for backend healthcheck
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/v1/utils/health-check/ > /dev/null; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready" >&2
          tail -100 /tmp/backend.log >&2 || true
          exit 1

      - name: Run Playwright tests
        run: bunx playwright test --fail-on-flaky-tests --trace=retain-on-failure --workers=2 --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        working-directory: frontend

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: frontend/blob-report
          include-hidden-files: true
          retention-days: 1

  merge-playwright-reports:
    needs:
      - test-playwright
      - changes
    if: ${{ !cancelled() && needs.changes.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v8
        with:
          path: frontend/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge into HTML Report
        run: bunx playwright merge-reports --reporter html ./all-blob-reports
        working-directory: frontend
      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: frontend/playwright-report
          retention-days: 30
          include-hidden-files: true

  # https://github.com/marketplace/actions/alls-green#why
  alls-green-playwright:
    if: always()
    needs:
      - test-playwright
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test-playwright
