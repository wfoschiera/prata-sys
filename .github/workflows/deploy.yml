name: Deploy

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: local
      PROJECT_NAME: "prata-sys"
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: changethis
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend
      - name: Create test database
        run: psql "postgresql://postgres:changethis@localhost:5432/app" -c "CREATE DATABASE app_test;"
      - name: Run migrations
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/test.sh
        working-directory: backend

  # Build images in CI and push to GHCR. The deploy host (7 GiB homelab box) only
  # pulls — it never builds.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          # Empty VITE_API_URL = same-origin: the SPA calls /api/* relative to
          # wherever it is served, so the bundle works on any host/domain.
          build-args: |
            VITE_API_URL=
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Connect runner to the private network (Tailscale)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-prata-sys

      - name: Copy stack config to the deploy host
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "compose.prod.yml,Caddyfile"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull and (re)start the stack on the deploy host
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          TAG: ${{ needs.build.outputs.tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,TAG
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            if [ ! -f .env ]; then
              echo "ERROR: $DEPLOY_PATH/.env is missing. Copy deploy/.env.example and fill in values." >&2
              exit 1
            fi
            export TAG
            # TrueNAS forbids adding users to the builtin "docker" group, so the
            # deploy user runs docker via passwordless sudo (scoped to /usr/bin/docker).
            sudo docker compose -f compose.prod.yml pull
            sudo docker compose -f compose.prod.yml up -d --wait --remove-orphans
            sudo docker image prune -f
            echo "Deployed $TAG"
