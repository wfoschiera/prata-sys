name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    if: github.repository_owner != 'fastapi'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: local
      PROJECT_NAME: "prata-sys"
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: changethis
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend
      - name: Run migrations
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/test.sh
        working-directory: backend

  deploy:
    needs: [test]
    if: github.repository_owner != 'fastapi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Connect runner to the private network (Tailscale)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-prata-sys

      - name: Rsync repo to deploy host
        uses: burnett01/rsync-deployments@7
        with:
          switches: >-
            -avz --delete
            --exclude='.git'
            --exclude='.venv'
            --exclude='node_modules'
            --exclude='__pycache__'
            --exclude='htmlcov'
            --exclude='.pytest_cache'
            --exclude='.mypy_cache'
            --exclude='.ruff_cache'
            --exclude='.coverage'
            --exclude='frontend/dist'
            --exclude='frontend/blob-report'
            --exclude='frontend/test-results'
            --exclude='frontend/playwright-report'
            --exclude='.env'
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Build and (re)start the stack on the deploy host
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            if [ ! -f .env ]; then
              echo "ERROR: $DEPLOY_PATH/.env is missing. Copy deploy/.env.example and fill in values." >&2
              exit 1
            fi
            docker compose -f compose.prod.yml build
            docker compose -f compose.prod.yml up -d --wait --remove-orphans
            docker image prune -f
