name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    if: github.repository_owner != 'fastapi'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: local
      PROJECT_NAME: "prata-sys"
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      SECRET_KEY: changethis
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend
      - name: Create test database
        run: psql "postgresql://postgres:changethis@localhost:5432/app" -c "CREATE DATABASE app_test;"
      - name: Run migrations
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/test.sh
        working-directory: backend

  deploy:
    needs: [test]
    if: github.repository_owner != 'fastapi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Connect runner to the private network (Tailscale)
        uses: tailscale/github-action@v4
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-prata-sys
          script: |
            # Wait for Tailscale to connect
            while ! tailscale status --json | jq -e '.Self?.TailscaleIPs | length > 0' > /dev/null; do
              echo "Waiting for Tailscale to connect..."
              sleep 5
            done
            echo "Tailscale connected with IPs: $(tailscale status --json | jq -r '.Self.TailscaleIPs[]')"
            rsync -avz . --exclude-from='rsync-exclude-list.txt' $SSH_USER@$SSH_HOST:$DEPLOY_PATH

      - name: Build and (re)start the stack on the deploy host
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            if [ ! -f .env ]; then
              echo "ERROR: $DEPLOY_PATH/.env is missing. Copy deploy/.env.example and fill in values." >&2
              exit 1
            fi
            docker compose -f compose.prod.yml build
            docker compose -f compose.prod.yml up -d --wait --remove-orphans
            docker image prune -f
