# Production stack: backend + frontend + Caddy reverse proxy on a single port.
# Postgres lives outside this compose, configured via .env (POSTGRES_SERVER, etc.).
#
# Quickstart on the deploy host:
#   docker compose -f compose.prod.yml up -d --build
#
# Logs:
#   docker compose -f compose.prod.yml logs -f
#
# Stop:
#   docker compose -f compose.prod.yml down

services:

  backend:
    image: ${DOCKER_IMAGE_BACKEND:-prata-sys-backend}:${TAG:-latest}
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Run migrations + seed superuser, then start the app. Idempotent on every restart.
    command: ["bash", "-c", "bash scripts/prestart.sh && fastapi run --workers 4 app/main.py"]
    # Resolve "host.docker.internal" to the host gateway so the backend can reach
    # an external Postgres listening on the host (e.g. POSTGRES_SERVER=host.docker.internal).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=${POSTGRES_SERVER?Variable not set}
      - POSTGRES_PORT=${POSTGRES_PORT?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-prata-sys-frontend}:${TAG:-latest}
    restart: unless-stopped
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL?Variable not set}
        - NODE_ENV=production

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  caddy-data:
  caddy-config:
