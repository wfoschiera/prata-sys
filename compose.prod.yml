# Production stack: backend + frontend + Caddy reverse proxy on a single port.
# Images are built by CI and pulled from GHCR — this host never builds.
# Postgres lives outside this compose, configured via .env (POSTGRES_SERVER, etc.).
#
# Deploy (normally done by GitHub Actions):
#   TAG=sha-xxxxxxx docker compose -f compose.prod.yml pull
#   TAG=sha-xxxxxxx docker compose -f compose.prod.yml up -d --wait
#
# Logs:
#   docker compose -f compose.prod.yml logs -f
#
# Stop:
#   docker compose -f compose.prod.yml down

services:

  backend:
    image: ${DOCKER_IMAGE_BACKEND:-ghcr.io/wfoschiera/prata-sys-backend}:${TAG:-latest}
    restart: unless-stopped
    # Run migrations + seed superuser, then start the app. Idempotent on every restart.
    # 2 workers to keep the memory footprint modest.
    # --forwarded-allow-ips='*' trusts X-Forwarded-For from any direct peer. This is
    # safe here because the backend has no published host port (see below) and is
    # only reachable from other containers on this compose's networks — i.e. only
    # Caddy can be the direct peer. --proxy-headers is already enabled by default
    # in `fastapi run`, so only the trusted-IP allowlist needs to be widened.
    command: ["bash", "-c", "bash scripts/prestart.sh && fastapi run --workers 2 --forwarded-allow-ips='*' app/main.py"]
    # Join the shared external network so the backend can reach a Postgres that
    # runs outside this stack (POSTGRES_SERVER=postgres). extra_hosts is kept as a
    # fallback for setups where Postgres listens on the host instead.
    networks:
      - default
      - prata-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - POSTGRES_SERVER=${POSTGRES_SERVER?Variable not set}
      - POSTGRES_PORT=${POSTGRES_PORT?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - SENTRY_DSN=${SENTRY_DSN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/readiness/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-ghcr.io/wfoschiera/prata-sys-frontend}:${TAG:-latest}
    restart: unless-stopped

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  caddy-data:
  caddy-config:

networks:
  # Bridges to the standalone Postgres stack. Create once on the host:
  #   docker network create prata-net
  prata-net:
    external: true
